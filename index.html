<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 사진 제출 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; background-color: #f4f7f6; }
        .container { background-color: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        input[type="file"] { margin-top: 5px; }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; margin-top: 20px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #45a049; }
        #loading { display: none; text-align: center; margin-top: 15px; color: #ff5722; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 학생 사진 제출</h2>
    
    <label for="studentClass">반</label>
    <input type="number" id="studentClass" placeholder="예: 3" required>
    
    <label for="studentNum">번호</label>
    <input type="number" id="studentNum" placeholder="예: 15" required>
    
    <label for="studentName">이름</label>
    <input type="text" id="studentName" placeholder="예: 홍길동" required>
    
    <label for="photoInput">사진 선택</label>
    <input type="file" id="photoInput" accept="image/*" required>
    
    <button onclick="uploadPhoto()">제출하기</button>
    
    <div id="loading">사진을 압축하고 전송하는 중입니다... 잠시만 기다려주세요! ⏳</div>
</div>

<script>
    // 🚨 1단계에서 복사해둔 구글 스크립트 '웹 앱 URL'을 아래 따옴표 안에 붙여넣으세요!
    const SCRIPT_URL = "여기에_선생님의_웹_앱_URL을_붙여넣으세요";

    function uploadPhoto() {
        const studentClass = document.getElementById('studentClass').value;
        const studentNum = document.getElementById('studentNum').value;
        const studentName = document.getElementById('studentName').value;
        const fileInput = document.getElementById('photoInput');
        
        if(!studentClass || !studentNum || !studentName || !fileInput.files[0]) {
            alert("모든 칸을 입력하고 사진을 선택해주세요!");
            return;
        }

        document.getElementById('loading').style.display = 'block';

        const file = fileInput.files[0];
        const reader = new FileReader();

        // 💡 핵심 기술: 브라우저에서 이미지 용량을 200KB 이하로 즉시 압축 (Canvas API 활용)
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800; // 가로 길이를 최대 800px로 제한
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                // quality를 0.7로 설정하여 용량을 확 줄임 (대부분 200KB 이하로 맞춰짐)
                const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);

                sendToGoogle(studentClass, studentNum, studentName, compressedDataUrl);
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    }

    function sendToGoogle(studentClass, studentNum, studentName, fileData) {
        const payload = {
            studentClass: studentClass,
            studentNum: studentNum,
            studentName: studentName,
            fileData: fileData
        };

        // 구글 스크립트로 데이터 전송 (CORS 오류 방지를 위해 text/plain 사용)
        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: {
                'Content-Type': 'text/plain;charset=utf-8', 
            }
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('loading').style.display = 'none';
            if(data.result === 'success') {
                alert("🎉 제출이 완료되었습니다!");
                location.reload(); // 폼 초기화
            } else {
                alert("오류가 발생했습니다: " + data.message);
            }
        })
        .catch(error => {
            document.getElementById('loading').style.display = 'none';
            alert("전송 중 오류가 발생했습니다. 다시 시도해주세요.");
            console.error(error);
        });
    }
</script>

</body>
</html>
